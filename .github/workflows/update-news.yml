name: Update AI News Daily

on:
  schedule:
    - cron: '0 8 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-news:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4.2.2

      - name: Set up Python
        uses: actions/setup-python@v5.6.0
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install feedparser

      - name: Run news update script
        run: python scripts/update_news.py

      - name: Commit and push
        run: |
          git config user.name "AI News Bot"
          git config user.email "bot@ailink.cn"
          git add index.html

          if git diff --staged --quiet; then
            echo "No changes to commit"
            exit 0
          fi

          git commit -m "auto: update daily AI news"
          git push
