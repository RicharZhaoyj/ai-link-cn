name: Daily Growth Monitor

on:
  schedule:
    - cron: '0 9 * * *'  # 每天UTC时间9:00运行（北京时间17:00）
  workflow_dispatch:  # 允许手动触发

jobs:
  monitor:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.9'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install requests sqlite3
    
    - name: Run growth monitoring
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        python scripts/monitor_growth.py
    
    - name: Upload report artifacts
      uses: actions/upload-artifact@v3
      with:
        name: daily-growth-report
        path: |
          reports/
          growth_data.db
        retention-days: 7
    
    - name: Check for significant changes
      run: |
        # 这里可以添加检查重要变化的逻辑
        # 比如：stars增长超过10，网站访问量翻倍等
        echo "检查重要变化..."
        
        # 示例：检查报告文件是否存在
        if [ -f "reports/daily_report_*.json" ]; then
          echo "报告生成成功"
        else
          echo "警告：报告未生成"
          exit 1
        fi