<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>注册/登录 - AI.link.cn</title>
    <style>
        :root {
            --primary: #667eea;
            --secondary: #764ba2;
            --success: #48bb78;
            --warning: #ed8936;
            --danger: #f56565;
            --light: #f7fafc;
            --dark: #2d3748;
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            line-height: 1.6;
            color: var(--dark);
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        
        .auth-container {
            width: 100%;
            max-width: 400px;
            padding: 2rem;
        }
        
        .auth-card {
            background: white;
            border-radius: 15px;
            padding: 2.5rem;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.2);
        }
        
        .logo {
            text-align: center;
            margin-bottom: 2rem;
        }
        
        .logo h1 {
            color: var(--primary);
            font-size: 2rem;
            margin-bottom: 0.5rem;
        }
        
        .logo p {
            color: #666;
            font-size: 0.9rem;
        }
        
        .tabs {
            display: flex;
            margin-bottom: 2rem;
            border-bottom: 2px solid #e2e8f0;
        }
        
        .tab {
            flex: 1;
            text-align: center;
            padding: 1rem;
            cursor: pointer;
            font-weight: bold;
            color: #666;
            transition: color 0.3s;
            border-bottom: 3px solid transparent;
        }
        
        .tab.active {
            color: var(--primary);
            border-bottom-color: var(--primary);
        }
        
        .tab-content {
            display: none;
        }
        
        .tab-content.active {
            display: block;
        }
        
        .form-group {
            margin-bottom: 1.5rem;
        }
        
        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 500;
            color: var(--dark);
        }
        
        .form-control {
            width: 100%;
            padding: 0.8rem 1rem;
            border: 2px solid #e2e8f0;
            border-radius: 8px;
            font-size: 1rem;
            transition: border-color 0.3s;
        }
        
        .form-control:focus {
            outline: none;
            border-color: var(--primary);
        }
        
        .btn {
            width: 100%;
            padding: 1rem;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.3s;
        }
        
        .btn-primary {
            background: var(--primary);
            color: white;
        }
        
        .btn-primary:hover {
            background: #5a67d8;
        }
        
        .btn-secondary {
            background: #e2e8f0;
            color: var(--dark);
        }
        
        .btn-secondary:hover {
            background: #cbd5e0;
        }
        
        .message {
            padding: 0.8rem;
            border-radius: 8px;
            margin-bottom: 1rem;
            display: none;
        }
        
        .message.success {
            background: #c6f6d5;
            color: #22543d;
            display: block;
        }
        
        .message.error {
            background: #fed7d7;
            color: #742a2a;
            display: block;
        }
        
        .auth-footer {
            text-align: center;
            margin-top: 2rem;
            padding-top: 1rem;
            border-top: 1px solid #e2e8f0;
            color: #666;
            font-size: 0.9rem;
        }
        
        .auth-footer a {
            color: var(--primary);
            text-decoration: none;
        }
        
        .back-link {
            display: inline-block;
            margin-bottom: 1rem;
            color: white;
            text-decoration: none;
        }
        
        .back-link:hover {
            text-decoration: underline;
        }
        
        @media (max-width: 480px) {
            .auth-container {
                padding: 1rem;
            }
            
            .auth-card {
                padding: 1.5rem;
            }
        }
    </style>
</head>
<body>
    <div class="auth-container">
        <a href="/index.html" class="back-link">← 返回首页</a>
        
        <div class="auth-card">
            <div class="logo">
                <h1>AI.link.cn</h1>
                <p>全方位投资分析系统</p>
            </div>
            
            <div class="tabs">
                <div class="tab active" onclick="switchTab('login')">登录</div>
                <div class="tab" onclick="switchTab('register')">注册</div>
            </div>
            
            <!-- 登录表单 -->
            <div id="login-tab" class="tab-content active">
                <div id="login-message" class="message"></div>
                
                <form id="login-form">
                    <div class="form-group">
                        <label for="login-email">邮箱地址</label>
                        <input type="email" id="login-email" class="form-control" placeholder="your@email.com" required>
                    </div>
                    
                    <div class="form-group">
                        <label for="login-password">密码</label>
                        <input type="password" id="login-password" class="form-control" placeholder="••••••••" required>
                    </div>
                    
                    <button type="submit" class="btn btn-primary">登录</button>
                </form>
                
                <div class="auth-footer">
                    <p>还没有账户？ <a href="javascript:void(0)" onclick="switchTab('register')">立即注册</a></p>
                </div>
            </div>
            
            <!-- 注册表单 -->
            <div id="register-tab" class="tab-content">
                <div id="register-message" class="message"></div>
                
                <form id="register-form">
                    <div class="form-group">
                        <label for="register-email">邮箱地址</label>
                        <input type="email" id="register-email" class="form-control" placeholder="your@email.com" required>
                    </div>
                    
                    <div class="form-group">
                        <label for="register-password">密码</label>
                        <input type="password" id="register-password" class="form-control" placeholder="至少6个字符" minlength="6" required>
                    </div>
                    
                    <div class="form-group">
                        <label for="register-confirm-password">确认密码</label>
                        <input type="password" id="register-confirm-password" class="form-control" placeholder="再次输入密码" required>
                    </div>
                    
                    <button type="submit" class="btn btn-primary">注册</button>
                </form>
                
                <div class="auth-footer">
                    <p>已有账户？ <a href="javascript:void(0)" onclick="switchTab('login')">立即登录</a></p>
                </div>
            </div>
            
            <!-- 成功后的显示 -->
            <div id="success-tab" class="tab-content">
                <div class="message success" id="success-message"></div>
                
                <div style="text-align: center; padding: 2rem 0;">
                    <h3 style="margin-bottom: 1rem; color: var(--primary);">🎉 欢迎使用 AI.link.cn</h3>
                    <p style="margin-bottom: 1.5rem; color: #666;">您的账户已成功创建，现在可以体验我们的投资分析系统。</p>
                    
                    <div style="margin-bottom: 1.5rem; padding: 1rem; background: #f7fafc; border-radius: 8px;">
                        <p style="margin-bottom: 0.5rem;"><strong>您的账户信息：</strong></p>
                        <p id="user-info" style="color: #666;"></p>
                    </div>
                    
                    <a href="/index.html" class="btn btn-primary" style="margin-bottom: 1rem;">前往首页</a>
                    <a href="/pricing.html" class="btn btn-secondary">查看定价计划</a>
                </div>
            </div>
        </div>
    </div>
    
    <script>
        let currentSessionToken = null;
        
        function switchTab(tabName) {
            // 隐藏所有标签内容
            document.querySelectorAll('.tab-content').forEach(tab => {
                tab.classList.remove('active');
            });
            
            // 移除所有标签的活动状态
            document.querySelectorAll('.tab').forEach(tab => {
                tab.classList.remove('active');
            });
            
            // 显示选中的标签内容
            document.getElementById(tabName + '-tab').classList.add('active');
            
            // 设置选中的标签为活动状态
            document.querySelector(`.tab[onclick="switchTab('${tabName}')"]`).classList.add('active');
            
            // 清空消息
            clearMessages();
        }
        
        function clearMessages() {
            document.getElementById('login-message').className = 'message';
            document.getElementById('register-message').className = 'message';
            document.getElementById('success-message').className = 'message';
        }
        
        function showMessage(elementId, type, text) {
            const element = document.getElementById(elementId);
            element.className = `message ${type}`;
            element.textContent = text;
        }
        
        // 登录表单提交
        document.getElementById('login-form').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const email = document.getElementById('login-email').value;
            const password = document.getElementById('login-password').value;
            
            try {
                const response = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ email, password })
                });
                
                const data = await response.json();
                
                if (response.ok) {
                    currentSessionToken = data.session_token;
                    
                    // 显示成功消息
                    showMessage('login-message', 'success', '登录成功！');
                    
                    // 显示用户信息
                    setTimeout(() => {
                        switchTab('success');
                        document.getElementById('success-message').className = 'message success';
                        document.getElementById('success-message').textContent = '登录成功！';
                        document.getElementById('user-info').innerHTML = `
                            邮箱: ${email}<br>
                            订阅: ${data.user?.subscription || 'free'}<br>
                            API调用剩余: ${data.user?.api_calls_remaining || 10}次/天
                        `;
                    }, 1000);
                } else {
                    showMessage('login-message', 'error', data.error || '登录失败');
                }
            } catch (error) {
                showMessage('login-message', 'error', '网络错误，请稍后重试');
            }
        });
        
        // 注册表单提交
        document.getElementById('register-form').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const email = document.getElementById('register-email').value;
            const password = document.getElementById('register-password').value;
            const confirmPassword = document.getElementById('register-confirm-password').value;
            
            // 验证密码
            if (password !== confirmPassword) {
                showMessage('register-message', 'error', '两次输入的密码不一致');
                return;
            }
            
            if (password.length < 6) {
                showMessage('register-message', 'error', '密码至少需要6个字符');
                return;
            }
            
            try {
                const response = await fetch('/api/auth/register', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ email, password })
                });
                
                const data = await response.json();
                
                if (response.ok || response.status === 201) {
                    showMessage('register-message', 'success', '注册成功！');
                    
                    // 自动登录
                    setTimeout(async () => {
                        try {
                            const loginResponse = await fetch('/api/auth/login', {
                                method: 'POST',
                                headers: {
                                    'Content-Type': 'application/json',
                                },
                                body: JSON.stringify({ email, password })
                            });
                            
                            const loginData = await loginResponse.json();
                            
                            if (loginResponse.ok) {
                                currentSessionToken = loginData.session_token;
                                switchTab('success');
                                document.getElementById('success-message').className = 'message success';
                                document.getElementById('success-message').textContent = '账户创建成功！';
                                document.getElementById('user-info').innerHTML = `
                                    邮箱: ${email}<br>
                                    订阅: 免费版<br>
                                    API调用: 10次/天<br>
                                    欢迎使用 AI.link.cn 投资分析系统！
                                `;
                            }
                        } catch (loginError) {
                            showMessage('register-message', 'error', '注册成功，但自动登录失败，请手动登录');
                        }
                    }, 1000);
                } else {
                    showMessage('register-message', 'error', data.error || '注册失败');
                }
            } catch (error) {
                showMessage('register-message', 'error', '网络错误，请稍后重试');
            }
        });
        
        // 检查URL参数，决定显示哪个标签
        window.addEventListener('load', function() {
            const urlParams = new URLSearchParams(window.location.search);
            const action = urlParams.get('action');
            
            if (action === 'register') {
                switchTab('register');
            }
            
            // 检查是否有错误消息
            const error = urlParams.get('error');
            if (error) {
                showMessage('login-message', 'error', decodeURIComponent(error));
            }
        });
        
        // API测试功能（开发用）
        async function testAPI() {
            if (!currentSessionToken) {
                alert('请先登录');
                return;
            }
            
            try {
                const response = await fetch('/api/premium/market/real-time?symbol=BTC-USD', {
                    headers: {
                        'Authorization': `Bearer ${currentSessionToken}`
                    }
                });
                
                const data = await response.json();
                
                if (response.ok) {
                    alert(`API调用成功！\n当前价格: $${data.data.price}\n剩余调用: ${data.user_limits.remaining_calls}次`);
                } else {
                    alert(`API调用失败: ${data.error || data.message}`);
                }
            } catch (error) {
                alert('API测试失败: ' + error.message);
            }
        }
    </script>
</body>
</html>
