<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>文章标题 — AI News</title>
    <meta name="description" content="一句话总结">
    <style>
        :root {
            --bg: #0f172a;
            --card-bg: #1e2937;
            --accent: #22d3ee;
            --text: #e2e8f0;
            --text-secondary: #94a3b8;
        }
        body {
            margin: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            line-height: 1.7;
        }
        .container {
            max-width: 720px;
            margin: 0 auto;
            padding: 40px 20px;
        }
        h1 {
            font-size: 2.2rem;
            line-height: 1.3;
            margin-bottom: 16px;
        }
        .summary {
            font-size: 1.15rem;
            color: var(--text-secondary);
            margin-bottom: 40px;
            padding-bottom: 24px;
            border-bottom: 1px solid #334155;
        }
        .meta {
            color: var(--text-secondary);
            font-size: 0.95rem;
            margin-bottom: 32px;
        }
        .content {
            font-size: 1.05rem;
            color: #e2e8f0;
        }
        .content h2 {
            margin-top: 48px;
            font-size: 1.4rem;
        }
        .tools-section {
            margin-top: 60px;
            padding-top: 32px;
            border-top: 1px solid #334155;
        }
        .tools-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
            gap: 16px;
            margin-top: 20px;
        }
        .tool-card {
            background: #1e2937;
            border: 1px solid #334155;
            border-radius: 12px;
            padding: 20px;
            text-decoration: none;
            color: inherit;
            transition: all 0.2s ease;
        }
        .tool-card:hover {
            border-color: #22d3ee;
            transform: translateY(-2px);
        }
        .tool-card h4 {
            margin: 0 0 8px;
            color: #e2e8f0;
        }
        .tool-card p {
            margin: 0;
            font-size: 0.95rem;
            color: #94a3b8;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>文章标题</h1>
        
        <div class="summary">
            <strong>一句话总结：</strong> 这里写核心判断（20-25字内）。
        </div>
        
        <div class="meta">
            发布于 2026-06-14
        </div>
        
        <div class="content">
            <!-- 文章正文从这里开始 -->
            <p>在这里开始写文章正文...</p>
            
            <h2>核心点评</h2>
            <p>第一点...</p>
            <p>第二点...</p>
            
            <h2>适用场景</h2>
            <p>...</p>
            
            <h2>不推荐场景</h2>
            <p>...</p>
        </div>
        
        <!-- 相关工具推荐模块 -->
        <div class="tools-section">
            <h3 style="margin-bottom: 8px;">相关工具推荐</h3>
            <p style="color:#94a3b8;margin-bottom:20px;">以下工具与本文主题相关，点击可查看详情：</p>
            
            <div class="tools-grid">
                <a href="https://tools.link.cn/tool/flux" class="tool-card">
                    <h4>Flux</h4>
                    <p>目前开源图像模型中真实感和速度表现最强的选择。</p>
                </a>
                
                <a href="https://tools.link.cn/tool/claude-3-5" class="tool-card">
                    <h4>Claude 3.5 Sonnet</h4>
                    <p>目前综合能力最强的 AI 模型之一，适合复杂任务。</p>
                </a>
            </div>
            
            <div style="margin-top:24px;text-align:center;">
                <a href="https://tools.link.cn" 
                   style="display:inline-block;color:#22d3ee;text-decoration:none;font-weight:600;">
                    在 AI Tool Hub 查看更多工具 →
                </a>
            </div>
        </div>
    </div>
</body>
</html>
