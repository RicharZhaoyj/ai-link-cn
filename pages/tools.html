<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>工具发现 — AI News</title>
    <style>
        body { font-family: 'Inter', system_ui, sans-serif; background:#0a0f1a; color:#f8fafc; margin:0; }
        .container { max-width:1100px; margin:0 auto; padding:40px 24px; }
        h1 { font-size:2.4rem; margin-bottom:40px; }
        .tool-grid {
            display:grid;
            grid-template-columns:repeat(auto-fit,minmax(300px,1fr));
            gap:24px;
        }
        .tool-card {
            background:#111827;
            border:1px solid #1f2937;
            border-radius:16px;
            padding:28px;
            text-decoration:none;
            color:inherit;
        }
        .tool-card:hover { border-color:#67e8f9; }
        .score {
            float:right;
            background:#166534;
            color:#86efac;
            padding:4px 12px;
            border-radius:9999px;
            font-size:0.85rem;
            font-weight:600;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>工具发现</h1>
        
        <div class="tool-grid">
            <a href="https://tools.link.cn/tool/flux" class="tool-card">
                <div style="display:flex;justify-content:space-between;">
                    <strong style="font-size:1.3rem;">Flux</strong>
                    <span class="score">9.4</span>
                </div>
                <p style="margin-top:16px;color:#94a3b8;">目前开源图像模型中真实感和速度平衡最好的选择。</p>
            </a>
            
            <a href="https://tools.link.cn/tool/claude-3-5" class="tool-card">
                <div style="display:flex;justify-content:space-between;">
                    <strong style="font-size:1.3rem;">Claude 3.5 Sonnet</strong>
                    <span class="score">9.6</span>
                </div>
                <p style="margin-top:16px;color:#94a3b8;">目前综合能力最强的模型，尤其适合复杂任务。</p>
            </a>
        </div>
    </div>
</body>
</html>
