<!-- AI.link.cn 智能分类导航组件 -->
<div class="category-navigation" id="categoryNav">
    <div class="category-header">
        <h2>🎯 智能分类导航</h2>
        <p class="subtitle">按场景、按用途、按预算快速找到合适的AI工具</p>
    </div>
    
    <div class="category-filters">
        <div class="filter-section">
            <h3>按使用场景</h3>
            <div class="filter-tags">
                <button class="filter-tag active" data-scenario="all">全部</button>
                <button class="filter-tag" data-scenario="student">👨‍🎓 学生</button>
                <button class="filter-tag" data-scenario="developer">👨‍💻 开发者</button>
                <button class="filter-tag" data-scenario="designer">🎨 设计师</button>
                <button class="filter-tag" data-scenario="marketer">📈 营销人员</button>
                <button class="filter-tag" data-scenario="business">💼 企业主</button>
                <button class="filter-tag" data-scenario="writer">✍️ 作者</button>
            </div>
        </div>
        
        <div class="filter-section">
            <h3>按工具类型</h3>
            <div class="filter-tags">
                <button class="filter-tag" data-category="all">全部类型</button>
                <button class="filter-tag" data-category="writing">✍️ 写作助手</button>
                <button class="filter-tag" data-category="design">🎨 设计创作</button>
                <button class="filter-tag" data-category="coding">💻 编程开发</button>
                <button class="filter-tag" data-category="productivity">📊 办公效率</button>
                <button class="filter-tag" data-category="marketing">📈 营销工具</button>
                <button class="filter-tag" data-category="research">🔬 研究分析</button>
            </div>
        </div>
        
        <div class="filter-section">
            <h3>按预算范围</h3>
            <div class="filter-tags">
                <button class="filter-tag" data-price="all">全部</button>
                <button class="filter-tag" data-price="free">💰 免费</button>
                <button class="filter-tag" data-price="low">💲 0-20$/月</button>
                <button class="filter-tag" data-price="medium">💲💲 20-100$/月</button>
                <button class="filter-tag" data-price="high">💲💲💲 100+$/月</button>
            </div>
        </div>
    </div>
    
    <div class="category-results">
        <div class="results-header">
            <h3>推荐工具 <span id="resultCount">0</span> 个</h3>
            <div class="sort-options">
                <select id="sortSelect">
                    <option value="rating">按评分排序</option>
                    <option value="name">按名称排序</option>
                    <option value="popularity">按热门度排序</option>
                </select>
            </div>
        </div>
        
        <div class="tools-grid" id="toolsGrid">
            <!-- 工具卡片将通过JavaScript动态生成 -->
            <div class="loading-spinner">
                <div class="spinner"></div>
                <p>正在加载工具数据...</p>
            </div>
        </div>
        
        <div class="workflow-suggestions" id="workflowSuggestions">
            <h3>💡 工作流建议</h3>
            <p>基于您的选择，为您推荐完整的工作流程：</p>
            <div class="workflow-list">
                <div class="workflow-item">
                    <h4>博客文章创作流程</h4>
                    <p>📝 使用ChatGPT + Grammarly + Midjourney完成完整的博客创作</p>
                    <div class="workflow-steps">
                        <span>1. ChatGPT大纲</span>
                        <span>2. 撰写草稿</span>
                        <span>3. Grammarly优化</span>
                        <span>4. Midjourney配图</span>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<style>

        background: white;
        border-radius: 12px;
        padding: 2rem;
        margin: 2rem 0;

    }
    
    .category-header {
        text-align: center;
        margin-bottom: 2rem;
        padding-bottom: 1.5rem;
        border-bottom: 2px solid #f0f0f0;
    }
    
    .category-header h2 {
        color: #333;

    }

    }

    }
    
    .filter-tag {
        padding: 8px 16px;

    }
    
    .filter-tag:hover {
        border-color: #667eea;

    }
    
    .filter-tag.active {
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);

    }
    
    .results-header {
        display: flex;

    .tool-card-enhanced .tool-header {

    .tool-card-enhanced .tool-icon {
        font-size: 1.8rem;

    }
    
    .tool-card-enhanced .tool-title {
        font-size: 1.2rem;

    }
    
    .tool-card-enhanced .tool-category {

    }
    
    .tool-card-enhanced .tool-actions {
        display: flex;
        gap: 10px;
    }
    
    .tool-card-enhanced .tool-action-btn {
        flex: 1;
        padding: 8px 12px;
        text-align: center;
        background: #667eea;
        color: white;
        border: none;
        border-radius: 6px;
        cursor: pointer;
        transition: all 0.3s ease;
        font-size: 0.9rem;
        font-weight: 500;
    }
    
    .tool-card-enhanced .tool-action-btn:hover {

    .tool-card-enhanced .quick-input-btn {

    }
    
    .tool-card-enhanced .quick-input-btn:hover {
        background: #38a169;
    }
    
    .loading-spinner {
        grid-column: 1 / -1;
        text-align: center;
        padding: 3rem;
    }
    
    .spinner {
        border: 4px solid #f3f3f3;
        border-top: 4px solid #667eea;
        border-radius: 50%;
        width: 40px;
        height: 40px;
        animation: spin 1s linear infinite;
        margin: 0 auto 1rem;
    }
    
    @keyframes spin {
        0% { transform: rotate(0deg); }
        100% { transform: rotate(360deg); }
    }
    
    .workflow-suggestions {
        background: linear-gradient(135deg, #f8f9fa 0%, #e9ecef 100%);
        padding: 1.5rem;
        border-radius: 10px;
        margin-top: 2rem;
    }
    
    .workflow-suggestions h3 {
        color: #333;
        margin-bottom: 0.8rem;
    }
    
    .workflow-suggestions p {
        color: #666;

    }
    
    .workflow-list {
        display: grid;

    }
    
    .workflow-item {
        background: white;
        padding: 1.2rem;
        border-radius: 8px;
        border-left: 4px solid #48bb78;
    }
    
    .workflow-item h4 {
        color: #333;
        margin-bottom: 0.5rem;
    }
    
    .workflow-steps {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        margin-top: 0.8rem;
    }
    
    .workflow-steps span {
        background: #e8f4fd;
        color: #2196f3;
        padding: 4px 10px;
        border-radius: 15px;
        font-size: 0.85rem;
    }
    
    @media (max-width: 768px) {
        .tools-grid {
            grid-template-columns: 1fr;
        }
        
        .filter-tags {
            flex-wrap: wrap;
        }
        
        .filter-tag {
            font-size: 0.85rem;
            padding: 6px 12px;
        }
        
        .results-header {
            flex-direction: column;
            gap: 1rem;
            align-items: stretch;
        }
        
        .workflow-steps {
            flex-direction: column;
        }
    }
</style>

<script>
    // 工具数据
    const toolsData = [
        {
            name: "ChatGPT",
            category: "writing",
            icon: "🤖",
            description: "OpenAI的对话AI，支持多种语言和复杂任务处理",
            rating: 4.8,
            pricing: "免费+付费",
            priceLevel: "low",
            scenarios: ["student", "developer", "marketer", "business", "writer"],
            hasQuickInput: true,
            slug: "chatgpt"
        },
        {
            name: "Grammarly",
            category: "writing",
            icon: "📝",
            description: "语法检查和写作改进工具",
            rating: 4.6,
            pricing: "免费+高级",
            priceLevel: "low",
            scenarios: ["student", "writer", "business"],
            hasQuickInput: true,
            slug: "grammarly"
        },
        {
            name: "Midjourney",
            category: "design",
            icon: "🎨",
            description: "AI图像生成工具，创造惊人的视觉效果",
            rating: 4.7,
            pricing: "$10-60/月",
            priceLevel: "medium",
            scenarios: ["designer", "marketer"],
            hasQuickInput: true,
            slug: "midjourney"
        },
        {
            name: "GitHub Copilot",
            category: "coding",
            icon: "💻",
            description: "AI编程助手，提升开发效率",
            rating: 4.7,
            pricing: "$10-19/月",
            priceLevel: "low",
            scenarios: ["developer"],
            hasQuickInput: true,
            slug: "github_copilot"
        },
        {
            name: "Jasper AI",
            category: "writing",
            icon: "✍️",
            description: "AI内容生成工具，快速创建高质量文本",
            rating: 4.5,
            pricing: "$49+/月",
            priceLevel: "medium",
            scenarios: ["marketer", "business"],
            hasQuickInput: true,
            slug: "jasper"
        },
        {
            name: "Canva",
            category: "design",
            icon: "🖼️",
            description: "在线设计平台，轻松创建专业视觉内容",
            rating: 4.6,
            pricing: "免费+专业",
            priceLevel: "low",
            scenarios: ["designer", "marketer", "student"],
            hasQuickInput: true,
            slug: "canva"
        },
        {
            name: "Notion AI",
            category: "productivity",
            icon: "📊",
            description: "Notion集成的AI助手，提升工作效率",
            rating: 4.6,
            pricing: "$10/月",
            priceLevel: "low",
            scenarios: ["student", "business", "developer"],
            hasQuickInput: true,
            slug: "notion_ai"
        },
        {
            name: "AutoGPT",
            category: "coding",
            icon: "⚙️",
            description: "自主运行的GPT-4实验，可以自动完成任务",
            rating: 4.5,
            pricing: "开源免费",
            priceLevel: "free",
            scenarios: ["developer", "researcher"],
            hasQuickInput: true,
            slug: "autogpt"
        },
        {
            name: "Langflow",
            category: "coding",
            icon: "🔗",
            description: "可视化构建LangChain应用的工具",
            rating: 4.4,
            pricing: "开源免费",
            priceLevel: "free",
            scenarios: ["developer", "researcher"],
            hasQuickInput: true,
            slug: "langflow"
        }
    ];
    
    // 工作流数据
    const workflowData = {
        student: {
            name: "学生学习流程",
            tools: ["ChatGPT", "Grammarly", "Notion AI"],
            description: "使用AI工具提升学习效率"
        },
        developer: {
            name: "开发者工作流",
            tools: ["GitHub Copilot", "AutoGPT", "ChatGPT"],
            description: "提升代码开发效率的工具组合"
        },
        designer: {
            name: "设计创作流程",
            tools: ["Midjourney", "Canva"],
            description: "从概念到完成的设计工作流"
        },
        marketer: {
            name: "营销内容创作",
            tools: ["Jasper AI", "ChatGPT", "Canva"],
            description: "完整的营销内容生产流程"
        }
    };
    
    // 过滤状态
    let currentFilter = {
        scenario: "all",
        category: "all",
        price: "all"
    };
    
    // 初始化分类导航
    function initCategoryNavigation() {
        // 绑定过滤器点击事件
        document.querySelectorAll('.filter-tag[data-scenario]').forEach(tag => {
            tag.addEventListener('click', function() {
                document.querySelectorAll('.filter-tag[data-scenario]').forEach(t => t.classList.remove('active'));
                this.classList.add('active');
                currentFilter.scenario = this.dataset.scenario;
                filterTools();
            });
        });
        
        document.querySelectorAll('.filter-tag[data-category]').forEach(tag => {
            tag.addEventListener('click', function() {
                document.querySelectorAll('.filter-tag[data-category]').forEach(t => t.classList.remove('active'));
                this.classList.add('active');
                currentFilter.category = this.dataset.category;
                filterTools();
            });
        });
        
        document.querySelectorAll('.filter-tag[data-price]').forEach(tag => {
            tag.addEventListener('click', function() {
                document.querySelectorAll('.filter-tag[data-price]').forEach(t => t.classList.remove('active'));
                this.classList.add('active');
                currentFilter.price = this.dataset.price;
                filterTools();
            });
        });
        
        // 排序事件
        document.getElementById('sortSelect').addEventListener('change', function() {
            filterTools();
        });
        
        // 初始渲染
        filterTools();
    }
    
    // 过滤工具
    function filterTools() {
        let filteredTools = [...toolsData];
        
        // 按场景过滤
        if (currentFilter.scenario !== 'all') {
            filteredTools = filteredTools.filter(tool => 
                tool.scenarios.includes(currentFilter.scenario)
            );
        }
        
        // 按类别过滤
        if (currentFilter.category !== 'all') {
            filteredTools = filteredTools.filter(tool => 
                tool.category === currentFilter.category
            );
        }
        
        // 按价格过滤
        if (currentFilter.price !== 'all') {
            filteredTools = filteredTools.filter(tool => 
                tool.priceLevel === currentFilter.price
            );
        }
        
        // 排序
        const sortBy = document.getElementById('sortSelect').value;
        filteredTools.sort((a, b) => {
            if (sortBy === 'rating') return b.rating - a.rating;
            if (sortBy === 'name') return a.name.localeCompare(b.name);
            return 0; // 默认不排序
        });
        
        // 渲染工具
        renderTools(filteredTools);
        
        // 更新工作流建议
        updateWorkflowSuggestions(currentFilter.scenario);
    }
    
    // 渲染工具卡片
    function renderTools(tools) {
        const toolsGrid = document.getElementById('toolsGrid');
        const resultCount = document.getElementById('resultCount');
        
        if (tools.length === 0) {
            toolsGrid.innerHTML = `
                <div class="no-results">
                    <h4>🔍 未找到匹配的工具</h4>
                    <p>请尝试调整筛选条件或选择其他分类</p>
                </div>
            `;
            resultCount.textContent = '0';
            return;
        }
        
        resultCount.textContent = tools.length.toString();
        
        toolsGrid.innerHTML = tools.map(tool => `
            <div class="tool-card-enhanced">
                <div class="tool-header">
                    <div class="tool-icon">${tool.icon}</div>
                    <div>
                        <div class="tool-title">${tool.name}</div>
                        <div class="tool-category">${getCategoryName(tool.category)}</div>
                    </div>
                </div>
                
                <div class="tool-description">
                    ${tool.description}
                </div>
                
                <div class="tool-meta">
                    <div class="tool-rating">
                        ⭐ ${tool.rating}/5.0
                    </div>
                    <div class="tool-pricing">
                        ${tool.pricing}
                    </div>
                </div>
                
                <div class="tool-actions">
                    <a href="/pages/tools/${tool.slug}.html" class="tool-action-btn">
                        查看详情
                    </a>
                    ${tool.hasQuickInput ? `
                        <button class="tool-action-btn quick-input-btn" onclick="openQuickInput('${tool.slug}')">
                            一键输入
                        </button>
                    ` : ''}
                </div>
            </div>
        `).join('');
    }
    
    // 获取类别名称
    function getCategoryName(category) {
        const categoryNames = {
            writing: '写作助手',
            design: '设计创作',
            coding: '编程开发',
            productivity: '办公效率',
            marketing: '营销工具',
            research: '研究分析'
        };
        return categoryNames[category] || category;
    }
    
    // 更新工作流建议
    function updateWorkflowSuggestions(scenario) {
        const workflowSuggestions = document.getElementById('workflowSuggestions');
        
        if (scenario !== 'all' && workflowData[scenario]) {
            const workflow = workflowData[scenario];
            workflowSuggestions.innerHTML = `
                <h3>💡 工作流建议</h3>
                <p>基于您的场景选择，为您推荐完整的工作流程：</p>
                <div class="workflow-list">
                    <div class="workflow-item">
                        <h4>${workflow.name}</h4>
                        <p>${workflow.description}</p>
                        <div class="workflow-steps">
                            ${workflow.tools.map(tool => `<span>${tool}</span>`).join('')}
                        </div>
                        <p style="margin-top: 10px; font-size: 0.9rem; color: #666;">
                            📌 点击工具卡片上的"一键输入"可以直接使用模板
                        </p>
                    </div>
                </div>
            `;
        } else {
            workflowSuggestions.innerHTML = `
                <h3>💡 工作流建议</h3>
                <p>选择一个使用场景，系统会为您推荐完整的工作流程。</p>
                <p style="color: #888; font-size: 0.9rem;">
                    例如：选择"开发者"会推荐GitHub Copilot + AutoGPT + ChatGPT组合
                </p>
            `;
        }
    }
    
    // 打开一键输入功能
    function openQuickInput(toolSlug) {
        // 这里将打开模态框或跳转到一键输入页面
        // 暂时先显示一个提示
        alert(`即将打开 ${toolSlug} 的一键输入功能\n\n功能正在开发中，敬请期待！`);
        
        // 实际实现时应该跳转到专门的页面，例如：
        // window.location.href = `/quick-input/${toolSlug}`;
    }
    
    // 页面加载完成后初始化
    document.addEventListener('DOMContentLoaded', initCategoryNavigation);
</script>
